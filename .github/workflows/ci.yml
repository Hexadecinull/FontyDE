# FontyDE — Decompiler Edition
# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]

jobs:

  linux-gcc:
    name: Linux / GCC
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -y && sudo apt-get install -y cmake zlib1g-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=17

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test - help
        run: ./build/fontyde --help

      - name: Smoke test - TTF
        run: |
          FONT=$(find /usr/share/fonts -name "*.ttf" 2>/dev/null | head -1)
          if [ -n "$FONT" ]; then
            ./build/fontyde --no-glyphs --no-cmap "$FONT" > /dev/null
            echo "TTF OK: $FONT"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: fontyde-linux-gcc
          path: build/fontyde

  linux-clang:
    name: Linux / Clang
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -y && sudo apt-get install -y cmake zlib1g-dev clang

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_CXX_STANDARD=17

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ./build/fontyde --help

  linux-woff2:
    name: Linux / GCC + WOFF2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake zlib1g-dev libbrotli-dev pkgconf

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DFONTYDE_WOFF2=ON

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Smoke test
        run: ./build/fontyde --help

  macos:
    name: macOS / AppleClang
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake zlib

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DZLIB_ROOT=$(brew --prefix zlib)

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Smoke test - help
        run: ./build/fontyde --help

      - name: Smoke test - OTF
        run: |
          FONT=$(find /System/Library/Fonts /Library/Fonts -name "*.otf" 2>/dev/null | head -1)
          if [ -n "$FONT" ]; then
            ./build/fontyde --no-glyphs --no-cmap "$FONT" > /dev/null
            echo "OTF OK: $FONT"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: fontyde-macos
          path: build/fontyde

  windows-msvc:
    name: Windows / MSVC
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install zlib via vcpkg
        run: vcpkg install zlib:x64-windows

      - name: Configure
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_CXX_STANDARD=17

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test
        run: .\build\Release\fontyde.exe --help

      - uses: actions/upload-artifact@v4
        with:
          name: fontyde-windows-msvc
          path: build/Release/fontyde.exe

  windows-mingw:
    name: Windows / MINGW64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-ninja

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17

      - name: Build
        run: cmake --build build -j4

      - name: Smoke test
        run: ./build/fontyde.exe --help

      - uses: actions/upload-artifact@v4
        with:
          name: fontyde-windows-mingw64
          path: build/fontyde.exe

  # ── Android — each ABI is fully independent ────────────────────────────────
  android:
    name: Android / ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # arm64-v8a and armeabi-v7a never cancel each other
      matrix:
        abi: [ arm64-v8a, armeabi-v7a ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17

      - name: Build
        run: cmake --build build -j$(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: fontyde-android-${{ matrix.abi }}
          path: build/fontyde

  # ── WebAssembly via Emscripten ─────────────────────────────────────────────
  web-wasm:
    name: Web / Emscripten (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.61

      - name: Configure
        # -S . is mandatory when using emcmake: the wrapper changes the cmake
        # executable path but does not forward the implicit source directory,
        # so ${CMAKE_CURRENT_SOURCE_DIR} would resolve to the build directory
        # without an explicit -S flag.
        run: |
          emcmake cmake -S . -B build-wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DFONTYDE_WEB=ON

      - name: Build
        run: cmake --build build-wasm -j$(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: fontyde-wasm
          path: |
            build-wasm/fontyde.js
            build-wasm/fontyde.wasm
            build-wasm/fontyde.html
