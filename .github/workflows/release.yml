# FontyDE — Decompiler Edition
# .github/workflows/release.yml
#
# Triggered on v*.*.* tags.
# Builds stripped release binaries for Linux, macOS, Windows, Android (both ABIs),
# and WASM, then creates a GitHub Release with all artifacts attached.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  release-linux:
    name: Release / Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update -y && sudo apt-get install -y cmake zlib1g-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_STANDARD=17

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Strip
        run: strip build/fontyde

      - name: Package
        run: |
          mkdir dist
          cp build/fontyde dist/
          cp README.md dist/
          cp -r docs/ dist/
          tar -czf fontyde-${{ github.ref_name }}-linux-x86_64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: fontyde-${{ github.ref_name }}-linux-x86_64.tar.gz

  release-macos:
    name: Release / macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake zlib

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DZLIB_ROOT=$(brew --prefix zlib)

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.logicalcpu)

      - name: Strip
        run: strip build/fontyde

      - name: Package
        run: |
          mkdir dist
          cp build/fontyde dist/
          cp README.md dist/
          cp -r docs/ dist/
          tar -czf fontyde-${{ github.ref_name }}-macos-x86_64.tar.gz -C dist .

      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: fontyde-${{ github.ref_name }}-macos-x86_64.tar.gz

  release-windows:
    name: Release / Windows x86_64
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-ninja
            zip

      - name: Configure
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17

      - name: Build
        run: cmake --build build -j4

      - name: Strip
        run: strip build/fontyde.exe

      - name: Package
        run: |
          mkdir dist
          cp build/fontyde.exe dist/
          cp README.md dist/
          cp -r docs/ dist/
          cd dist && zip -r ../fontyde-${{ github.ref_name }}-windows-x86_64.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: fontyde-${{ github.ref_name }}-windows-x86_64.zip

  release-android:
    name: Release / Android ${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [ arm64-v8a, armeabi-v7a ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Strip
        run: |
          STRIP=${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          $STRIP build/fontyde

      - name: Package
        run: |
          ABI=${{ matrix.abi }}
          cp build/fontyde fontyde-${{ github.ref_name }}-android-${ABI}
          tar -czf fontyde-${{ github.ref_name }}-android-${ABI}.tar.gz \
            fontyde-${{ github.ref_name }}-android-${ABI} \
            README.md

      - uses: actions/upload-artifact@v4
        with:
          name: release-android-${{ matrix.abi }}
          path: fontyde-${{ github.ref_name }}-android-${{ matrix.abi }}.tar.gz

  release-wasm:
    name: Release / WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.61

      - name: Configure
        # -S . is required: emcmake replaces the cmake binary but does not
        # forward the implicit source directory, so CMAKE_CURRENT_SOURCE_DIR
        # would point at the build dir without an explicit -S flag.
        run: |
          emcmake cmake -S . -B build-wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DFONTYDE_WEB=ON

      - name: Build
        run: cmake --build build-wasm -j$(nproc)

      - name: Package
        run: |
          mkdir dist-wasm
          cp build-wasm/fontyde.js   dist-wasm/
          cp build-wasm/fontyde.wasm dist-wasm/
          cp build-wasm/fontyde.html dist-wasm/index.html
          cp README.md dist-wasm/
          zip -r fontyde-${{ github.ref_name }}-wasm.zip dist-wasm/

      - uses: actions/upload-artifact@v4
        with:
          name: release-wasm
          path: fontyde-${{ github.ref_name }}-wasm.zip

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release-linux
      - release-macos
      - release-windows
      - release-android
      - release-wasm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: FontyDE ${{ github.ref_name }}
          body: |
            ## FontyDE ${{ github.ref_name }} — Decompiler Edition

            Universal font decompiler. Converts binary font files into annotated `.fyde` source.

            ### Supported formats
            TTF · OTF · WOFF · WOFF2* · TTC · OTC
            Type 1 PFB/PFA · BDF · FNT · FON
            AngelCode BMFont (text + binary) · PSF/PSF2 · PCF · AFM · SVG Font

            *WOFF2 requires building from source with `-DFONTYDE_WOFF2=ON`

            ### Downloads
            | Platform | File |
            |----------|------|
            | Linux x86_64 | `fontyde-${{ github.ref_name }}-linux-x86_64.tar.gz` |
            | macOS | `fontyde-${{ github.ref_name }}-macos-x86_64.tar.gz` |
            | Windows x86_64 | `fontyde-${{ github.ref_name }}-windows-x86_64.zip` |
            | Android arm64-v8a | `fontyde-${{ github.ref_name }}-android-arm64-v8a.tar.gz` |
            | Android armeabi-v7a | `fontyde-${{ github.ref_name }}-android-armeabi-v7a.tar.gz` |
            | WebAssembly | `fontyde-${{ github.ref_name }}-wasm.zip` |

            ### Usage
            ```
            fontyde [--no-glyphs] [--no-cmap] [--no-kern] -o out/ font.ttf
            ```

            See `README.md` for full documentation.
          files: |
            artifacts/release-linux/*.tar.gz
            artifacts/release-macos/*.tar.gz
            artifacts/release-windows/*.zip
            artifacts/release-android-arm64-v8a/*.tar.gz
            artifacts/release-android-armeabi-v7a/*.tar.gz
            artifacts/release-wasm/*.zip
          draft: false
          prerelease: false
